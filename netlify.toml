[build]
  base = "solmint"
  command = "pnpm install && pnpm run build"
  publish = "dist/public"

# SPA redirect - only redirect routes without file extensions
# This allows static assets to be served directly
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  # Only apply redirect to routes that don't have a file extension (no dot)
  conditions = {NOT = {Path = "/*.*"}}

[context.production.environment]
  NODE_VERSION = "22"
